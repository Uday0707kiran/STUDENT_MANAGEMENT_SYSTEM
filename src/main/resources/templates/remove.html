<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <title>Delete Student</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <style>
        body {
            background-color: #f8f9fa;
        }

         .navbar {
            background-color: rgb(0, 0, 0);
        }

        .navbar-brand img {
            height: 50px;
            border: 2px solid #dc3545;
            border-radius: 50%;
        }

        .container {
            margin-top: 6%;
            width: 40%;
        }

        .card {
            border: 2px solid #17a2b8;
            padding: 5%;
        }

        .alert {
            border: 2px solid #343a40;
        }

        .badge-danger {
            background-color: #dc3545;
            border: none;
            width: 40%; /* Make the button full width */
            font-size: 20px; /* Increase font size */
        }

        .badge-danger:hover {
            background-color: #c82333;
        }

        .form-control {
            border: 2px solid #17a2b8;
        }

        /* Center the button */
        .text-center {
            text-align: center;
        }
    </style>
</head>
<body>
    <div>
       <nav class="navbar navbar-expand-lg navbar-dark">
        <a class="navbar-brand" href="/"><img src="studentlogo.jpg" alt="Student" /></a>
        <button class="navbar-toggler" type="button" data-toggle="collapse"
            data-target="#navbarNav" aria-controls="navbarNav"
            aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item active"><a class="nav-link" href="/">Home
                        <span class="sr-only">(current)</span>
                </a></li>
                <li class="nav-item"><a class="nav-link" href="viewInfo">View</a></li>
                <li class="nav-item"><a class="nav-link" href="register">Add</a></li>
                <li class="nav-item"><a class="nav-link" href="updateInfo">Update</a>
                </li>
                <li class="nav-item"><a class="nav-link" href="#">About</a>
                </li>
            </ul>
        </div>
    </nav>
    </div>
    <div class="container" style="width: 40%; margin-top: 30px;">
        <div class="card">
            <div class="alert alert-success" role="alert" th:text="${success}" th:if="${success}"></div>
            <div class="alert alert-danger" role="alert" th:text="${error}" th:if="${error}"></div>
            <form action="/deleteStudent" method="get">
                <input type="hidden" name="_method" value="delete">
                <div class="form-group">
                    <label for="studentId">Enter the Student ID</label>
                    <input type="text" id="studentId" name="kodId" class="form-control" placeholder="Enter the Student ID" required>
                </div>
               
                <!-- Centered and larger "Remove" button -->
                <div class="text-center">
                    <button class="badge badge-pill badge-danger" type="submit">Remove</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
