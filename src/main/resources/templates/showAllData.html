<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Student List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar {
            background-color: rgb(0, 0, 0);
        }

        .navbar-brand img {
            height: 50px;
            border: 2px solid #dc3545;
            border-radius: 50%;
        }

        .container {
            margin-top: 20px;
        }

        .alert {
            border: 2px solid #343a40;
            margin-top: 20px;
        }

        .table-info {
            background-color: #17a2b8;
            color: #fff;
        }

        .table-hover tbody tr:hover {
            background-color: #f8f9fa;
        }

        .table th, .table td {
            border: 2px solid #343a40;
        }

        .table-secondary th {
            background-color: #6c757d;
            color: #fff;
        }

        .table-warning td {
            background-color: rgb(255, 255, 183);
        }

        .table-warning td {
            color: #343a40;
        }
    </style>
</head>
<body>
    <div>
        <nav class="navbar navbar-expand-lg navbar-dark">
        <a class="navbar-brand" href="/"><img src="studentlogo.jpg" alt="Student" /></a>
        <button class="navbar-toggler" type="button" data-toggle="collapse"
            data-target="#navbarNav" aria-controls="navbarNav"
            aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item active"><a class="nav-link" href="/">Home
                        <span class="sr-only">(current)</span>
                </a></li>
                <li class="nav-item"><a class="nav-link" href="viewInfo">View</a></li>
                <li class="nav-item"><a class="nav-link" href="register">Add</a></li>
                <li class="nav-item"><a class="nav-link" href="updateInfo">Update</a>
                </li>
                <li class="nav-item"><a class="nav-link" href="#">About</a>
                </li>
            </ul>
        </div>
    </nav>
    </div>
    <div class="container mt-5">
		<h2 style="text-align: center; font-style: italic;">Student Details</h2>
        <div class="container">
            <div class="alert alert-success" role="alert" th:text="${success}" th:if="${success}"></div>
            <div class="alert alert-danger text-center" role="alert" th:text="${error}" th:if="${error}"></div>
            <table class="table table-hover">
                <thead>
                    <tr class="table-secondary">
                        <th scope="col">Id</th>
                        <th scope="col">Name</th>
                        <th scope="col">Branch</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="table-warning" th:each="Student: ${list}">
                        <td th:text="${Student.kodId}"></td>
                        <td th:text="${Student.name}"></td>
                        <td th:text="${Student.branch}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
