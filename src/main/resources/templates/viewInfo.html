<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <title>View Information</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
        crossorigin="anonymous">
        <style>
			  body {
            background-color: #f8f9fa;
        }

        .navbar {
            background-color: rgb(0, 0, 0);
        }

        .navbar-brand img {
            height: 50px;
            border: 2px solid #dc3545;
            border-radius: 50%;
        }

        .container {
            margin-top: 6%;
            width: 40%;
        }

        .card {
            border: 2px solid #17a2b8;
            padding: 5%;
        }

        .alert {
            border: 2px solid #343a40;
        }

        .input-group-text {
            background-color: #343a40;
            color: #ffffff;
        }

        .form-control {
            border: 2px solid #17a2b8;
        }

        .badge-danger {
            background-color: #dc3545;
            border: none;
        }

        .badge-danger:hover {
            background-color: #c82333;
        }
		</style>
</head>
<body>
    <div>
        <nav class="navbar navbar-expand-lg navbar-dark">
        <a class="navbar-brand" href="/"><img src="studentlogo.jpg" alt="Student" /></a>
        <button class="navbar-toggler" type="button" data-toggle="collapse"
            data-target="#navbarNav" aria-controls="navbarNav"
            aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item active"><a class="nav-link" href="/">Home
                        <span class="sr-only">(current)</span>
                </a></li>
                <li class="nav-item"><a class="nav-link" href="viewInfo">View</a></li>
                <li class="nav-item"><a class="nav-link" href="register">Add</a></li>
                <li class="nav-item"><a class="nav-link" href="updateInfo">Update</a>
                </li>
                <li class="nav-item"><a class="nav-link" href="#">About</a>
                </li>
            </ul>
        </div>
    </nav>
    </div>
    <div class="container" style="width: 40%; margin-top: 10%;">
        <div class="card border border-primary rounded text-center p-4">
            <div class="alert alert-success" role="alert" th:text="${success}" th:if="${success}"></div>
            <div class="alert alert-danger" role="alert" th:text="${error}" th:if="${error}"></div>
            <form action="/getStudent" method="get">
                <h4 class="mb-4">Enter the Student ID</h4>
                <input type="text" name="kodId" class="form-control mb-3" placeholder="Enter the Student ID" required>
                <button class="btn btn-danger" type="submit" name="submit">Get Student</button>
            </form>
        </div>
    </div>
</body>
</html>
