<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
        crossorigin="anonymous">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar {
            background-color: rgb(0, 0, 0);
        }

        .navbar-brand img {
            height: 50px;
            border: 2px solid #dc3545;
            border-radius: 50%;
        }

        .container {
            margin-top: 6%;
            width: 40%;
        }

        .card {
            border: 2px solid #17a2b8;
            padding: 5%;
        }

        .alert {
            border: 2px solid #343a40;
        }

        .input-group-text {
            background-color: #343a40;
            color: #ffffff;
        }

        .form-control {
            border: 2px solid #17a2b8;
        }

        .badge-danger {
            background-color: #dc3545;
            border: none;
        }

        .badge-danger:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

<div>
     <nav class="navbar navbar-expand-lg navbar-dark">
        <a class="navbar-brand" href="/"><img src="studentlogo.jpg" alt="Student" /></a>
        <button class="navbar-toggler" type="button" data-toggle="collapse"
            data-target="#navbarNav" aria-controls="navbarNav"
            aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item active"><a class="nav-link" href="/">Home
                        <span class="sr-only">(current)</span>
                </a></li>
                <li class="nav-item"><a class="nav-link" href="viewInfo">View</a></li>
                <li class="nav-item"><a class="nav-link" href="register">Add</a></li>
                <li class="nav-item"><a class="nav-link" href="updateInfo">Update</a>
                </li>
                <li class="nav-item"><a class="nav-link" href="#">About</a>
                </li>
            </ul>
        </div>
    </nav>
</div>
<div class="container">
    <div class="card">
        <div class="alert alert-success" role="alert" th:text="${success}" th:if="${success}"></div>
        <div class="alert alert-danger" role="alert" th:text="${error}" th:if="${error}"></div>
        <form action="/addStudent" method="post">
            <div class="form-group">
                <label for="kodId">Enter the Student Id</label>
                <input type="text" name="kodId" required class="form-control" id="kodId" placeholder="Enter the Id">
            </div>

            <div class="form-group">
                <label for="name">Enter the Student Name</label>
                <input type="text" name="name" required class="form-control" id="name" placeholder="Enter the Name">
            </div>

            <div class="form-group">
                <label for="branch">Enter the Student Branch</label>
                <input type="text" name="branch" required class="form-control" id="branch" placeholder="Enter the Branch">
            </div>

            <button class="btn btn-danger" type="submit" name="submit">Register</button>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
        integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYlT"
        crossorigin="anonymous"></script>
</body>
</html>
