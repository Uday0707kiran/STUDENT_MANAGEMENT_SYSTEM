<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Home</title>
<link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
    integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
    crossorigin="anonymous">
<style>
    body {
        background-color: #f8f9fa;
    }

    .navbar {
        background-color: #343a40 !important;
    }

    .navbar-dark .navbar-nav .nav-link {
        color: white !important;
    }

    .navbar-brand img {
        height: 50px;
        border: 2px solid #dc3545;
        border-radius: 50%;
    }

    .container h2 {
        color: #dc3545;
        text-align: center;
        margin-top: 5%;
    }

    .btn {
        font-size: 18px;
        padding: 10px 20px;
        margin: 10px;
    }
</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <a class="navbar-brand" href="/"><img src="studentlogo.jpg" alt="Student" /></a>
        <button class="navbar-toggler" type="button" data-toggle="collapse"
            data-target="#navbarNav" aria-controls="navbarNav"
            aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item active"><a class="nav-link" href="/">Home
                        <span class="sr-only">(current)</span>
                </a></li>
                <li class="nav-item"><a class="nav-link" href="viewInfo">View</a></li>
                <li class="nav-item"><a class="nav-link" href="register">Add</a></li>
                <li class="nav-item"><a class="nav-link" href="updateInfo">Update</a>
                </li>
                <li class="nav-item"><a class="nav-link" href="#">About</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h2>Welcome to Student Management System!!</h2>
    </div>

    <div class="container text-center mt-5">
        <div class="alert alert-success" role="alert" th:text="${success}" th:if="${success}"></div>
        <div class="alert alert-danger" role="alert" th:text="${error}" th:if="${error}"></div>
        <a href="viewInfo" class="btn btn-outline-info">View Student Details</a>
        <a href="register" class="btn btn-outline-danger">Add New Student Details</a>
        <a href="updateInfo" class="btn btn-outline-dark">Update Student Details</a>
        <a href="remove" class="btn btn-outline-warning">Delete/Remove Details</a>
        <a href="/show" class="btn btn-outline-success">Show All Students Details</a>
    </div>
</body>
</html>
